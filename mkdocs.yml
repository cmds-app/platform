site_name: CMDS Docs
site_url: https://docs.cmds.app
site_description: Developer documentation for CMDS projects.
site_dir: dist
repo_url: https://github.com/cmds-app/platform
edit_uri: edit/main/platform/docs/

theme:
  name: material
  font:
    text: Inter
    code: Roboto Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # - navigation.instant    # disabled: breaks livereload in `mkdocs serve`
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

plugins:
  - search

extra_css:
  - stylesheets/extra.css

nav:
  - Home:
      - Welcome: index.md
      - Environments: environments.md
      - Contributions: contributions.md
  - Help Center:
      - Resources: help/index.md
      - Quick links: help/quick-links.md
      - Tips: help/tips.md
      - Terminology: help/terminology.md
  - Guides:
      - Overview: guides/index.md
      - User guides:
          - Learner: guides/user/learner.md
          - Validator: guides/user/validator.md
          - Administrator: guides/user/administrator.md
      - Orientation guides:
          - Orientations and certificates: guides/orientation/orientations-and-certificates.md
      - Registration guides:
          - Keyera learning catalogue &amp; registration quick reference: guides/registration/learning-catalogue-and-registration.md
  - SCORM:
      - Overview: scorm/index.md
      - Glossary: scorm/glossary.md
      - Versions: scorm/versions.md
      - Tutorials: scorm/tutorials.md
  - Developers:
      - Overview: developers/index.md
      - Getting started:
          - Queries and commands: developers/getting-started/queries-and-commands.md
      - API:
          - Introduction: developers/api/introduction.md
          - Authentication: developers/api/authentication.md
          - Request/response formats: developers/api/request-and-response-formats.md
          - Rate limits and throttling: developers/api/rate-limits-and-throttling.md
          - Legacy: developers/api/legacy.md
      - Resources:
          - .NET: developers/resources/dotnet-versions.md
          - Date and time values: developers/resources/date-and-time-values.md
      - Integrations:
          - Power BI: developers/integrations/power-bi.md
          - Safe Exam Browser: developers/integrations/safe-exam-browser.md
          - Single Sign-On: developers/integrations/single-sign-on.md
  - Contributors:
      - Overview: contributors/index.md
      - Conventions:
          - Folder structure: contributors/conventions/folder-structure.md
          - Project names: contributors/conventions/project-names.md
          - API conventions: contributors/conventions/api-conventions.md
          - Database schemas: contributors/conventions/database-schemas.md
          - README files: contributors/conventions/readme-files.md
          - Style guide: contributors/conventions/style-guide.md
          - Task list comment tokens: contributors/conventions/task-list-comment-tokens.md
          - Version numbers: contributors/conventions/version-numbers.md
          - Video recommendations: contributors/conventions/video-recommendations.md
      - Tools:
          - IDE: contributors/tools/ide.md
          - Reporting Services: contributors/tools/reporting-services.md
      - Projects:
          - Overview: projects/index.md
          - Bump: projects/bump.md
  - Changelog:
      - Overview: changelog/index.md
      - Release dates: changelog/release-dates.md
      - Release notes: changelog/release-notes.md
